preset: debug
train_seq_len: 256
seq_lens_eval: [256, 512]
train_steps: 200
batch_size: 32
eval_every: 50
log_every: 10
checkpoint_every: 100
test_examples_per_count: 20
probe_examples_per_count: 50
attention_examples_per_count: 20
corrupt_examples_per_count: 20
seeds: [1234]
model:
  vocab_size: 90
  n_layers: 4
  n_heads: 4
  d_model: 256
  d_mlp: 1024
  dropout: 0.0
  context_len: 2048
optimizer:
  name: adamw
  learning_rate: 0.0003
  betas: [0.9, 0.95]
  weight_decay: 0.1
  warmup_steps: 20
  grad_clip_norm: 1.0

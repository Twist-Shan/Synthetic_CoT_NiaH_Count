preset: main
train_seq_len: 256
seq_lens_eval: [256, 512, 1024]
train_steps: 10000
batch_size: 128
eval_every: 500
log_every: 50
checkpoint_every: 1000
test_examples_per_count: 1000
probe_examples_per_count: 500
attention_examples_per_count: 100
corrupt_examples_per_count: 200
seeds: [1234, 1235, 1236, 1237, 1238]
model:
  vocab_size: 90
  n_layers: 4
  n_heads: 4
  d_model: 256
  d_mlp: 1024
  dropout: 0.0
  context_len: 2048
optimizer:
  name: adamw
  learning_rate: 0.0003
  betas: [0.9, 0.95]
  weight_decay: 0.1
  warmup_steps: 500
  grad_clip_norm: 1.0

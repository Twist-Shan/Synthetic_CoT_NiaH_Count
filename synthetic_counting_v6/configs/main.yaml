preset: main
seq_len: 256
noise_vocab_size: 64
marker_vocab_size: 10
min_count: 1
max_count: 10
seed: 1234
run_probes: true
run_attention: true
model:
  architecture: gpt2_lm_head
  position_embedding: learned_absolute
  n_layer: 4
  n_head: 4
  n_embd: 256
  n_positions: 320
  activation_function: gelu_new
  resid_pdrop: 0.0
  embd_pdrop: 0.0
  attn_pdrop: 0.0
  tie_word_embeddings: true
train:
  train_steps: 20000
  batch_size: 128
  learning_rate: 0.0003
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip_norm: 1.0
  warmup_steps: 500
  eval_every: 500
  log_every: 50
  save_every: 0
eval:
  test_examples_per_count: 1000
  val_examples_per_count: 200
  probe_train_examples_per_count: 500
  probe_test_examples_per_count: 500
  attention_examples_per_count: 100


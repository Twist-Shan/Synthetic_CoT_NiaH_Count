preset: debug
seq_len: 64
noise_vocab_size: 64
marker_vocab_size: 10
min_count: 1
max_count: 10
seed: 1234
run_probes: true
run_attention: true
model:
  architecture: gpt2_lm_head
  position_embedding: learned_absolute
  n_layer: 2
  n_head: 2
  n_embd: 128
  n_positions: 128
  activation_function: gelu_new
  resid_pdrop: 0.0
  embd_pdrop: 0.0
  attn_pdrop: 0.0
  tie_word_embeddings: true
train:
  train_steps: 200
  batch_size: 32
  learning_rate: 0.0004
  betas: [0.9, 0.95]
  weight_decay: 0.1
  grad_clip_norm: 1.0
  warmup_steps: 20
  eval_every: 50
  log_every: 10
  save_every: 0
eval:
  test_examples_per_count: 20
  val_examples_per_count: 20
  probe_train_examples_per_count: 20
  probe_test_examples_per_count: 20
  attention_examples_per_count: 10


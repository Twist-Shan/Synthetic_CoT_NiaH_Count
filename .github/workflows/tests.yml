name: tests

on:
  push:
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install lightweight test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pyyaml
      - name: Run tests
        run: PYTHONPATH=src pytest -q
